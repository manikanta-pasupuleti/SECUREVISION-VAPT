<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}SecureVision VAPT{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  </head>
  <body>
    <div class="background-glow background-glow-a"></div>
    <div class="background-glow background-glow-b"></div>
    <header class="topbar">
      <div>
        <p class="eyebrow">SecureVision VAPT</p>
        <h1>Surveillance exposure dashboard</h1>
      </div>
      <nav>
        <a href="{{ url_for('index') }}">Home</a>
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('devices') }}">Devices</a>
        <a href="{{ url_for('reports') }}">Reports</a>
      </nav>
    </header>

    <main class="shell">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <section class="flash-stack">
            {% for category, message in messages %}
              <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
          </section>
        {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </main>
  </body>
</html>
