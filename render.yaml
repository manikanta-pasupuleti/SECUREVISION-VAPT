services:
  - type: web
    name: securevision-vapt
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -b 0.0.0.0:$PORT wsgi:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: SECUREVISION_DB_PATH
        value: /tmp/securevision/database.db